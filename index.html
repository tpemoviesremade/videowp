<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>video hub simple</title>
</head>
<body>

<h2>Video Hub 🎬</h2>

<button onclick="play('video1.mp4')">Video 1</button>
<button onclick="play('video2.mp4')">Video 2</button>
<button onclick="play('video3.mp4')">Video 3</button>

<script>
function play(src) {
    // open video directly in WP7 player
    window.location = src;
}
</script>

</body>
</html>
