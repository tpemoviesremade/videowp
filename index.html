<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>video hub mini</title>
<style>
body {
    background:#111;
    color:#fff;
    font-family:Arial;
    text-align:center;
}
button {
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:16px;
}
video {
    width:100%;
    max-height:240px;
    background:#000;
}
</style>
</head>
<body>

<h2>my vids 🎬</h2>

<video id="player" controls></video>

<button onclick="play('video1.mp4')">video 1</button>
<button onclick="play('video2.mp4')">video 2</button>
<button onclick="play('video3.mp4')">video 3</button>

<script>
function play(src) {
    var v = document.getElementById("player");
    v.src = src;
    v.play();
}
</script>

</body>
</html>
